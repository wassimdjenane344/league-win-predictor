name: PR -> dev

on:
  pull_request:
    branches: [dev]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Pull DVC-tracked dataset
        run: dvc pull

      - name: Lint (ruff)
        run: ruff check backend/app ml/src

      - name: Unit tests
        run: pytest tests/unit -v

      - name: Integration tests
        run: pytest tests/integration -v

      - name: Build backend Docker image (no push)
        run: docker build -t lol-win-predictor-backend:pr-${{ github.event.number }} ./backend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend Docker image (no push)
        run: docker build -t lol-win-predictor-frontend:pr-${{ github.event.number }} ./frontend
