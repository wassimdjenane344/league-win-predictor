global:
  scrape_interval: 15s

scrape_configs:
  # Scrapes the LIVE PRODUCTION backend on Render (not a local container),
  # satisfying the spec's "monitoring should run against the live production
  # deployment, not only local dev". Launch with docker-compose.monitoring.yml.
  - job_name: "flask_backend_prod"
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ["lol-backend-awex.onrender.com"]
