name: staging -> main

# "staging -> main" required pipeline (final project spec): requires passing
# model promotion gates, then deploys the code/model previously validated on
# staging to production. If ml/src/promote.py's quality gate fails, this job
# fails and the deploy-to-production step below never runs -- Production is
# left untouched, exactly as required.
#
# With a shared registry secret (DagsHub), promote.py promotes the exact
# candidate that dev->staging registered in "Staging". Without a secret, the
# job falls back to a local file store and trains + registers a deterministic
# candidate first (same seed => identical model), so the promotion gate still
# runs green and end-to-end. See README section 10.
on:
  push:
    branches: [main]

jobs:
  promote-and-deploy:
    runs-on: ubuntu-latest
    environment: production # GitHub Environment -> scopes the secrets below
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || format('file://{0}/ml/mlruns', github.workspace) }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_MODEL_NAME: lol-win-predictor
      # `secrets` can't be used directly in a step-level `if`, so we derive a
      # boolean env from it here (env may reference secrets) and test that below.
      HAS_SHARED_REGISTRY: ${{ secrets.MLFLOW_TRACKING_URI != '' }}
      # Render deploy hooks (masked). Deploying only from here -- after the
      # promotion gate passed -- guarantees the newly-restarted backend loads
      # the model that was *just* promoted to Production (turn OFF Render's own
      # auto-deploy so this is the single source of production deploys).
      BACKEND_DEPLOY_HOOK: ${{ secrets.PRODUCTION_BACKEND_DEPLOY_HOOK_URL }}
      FRONTEND_DEPLOY_HOOK: ${{ secrets.PRODUCTION_FRONTEND_DEPLOY_HOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Pull DVC-tracked dataset
        run: dvc pull

      # Only needed in the no-shared-registry fallback: make sure there IS a
      # candidate in "Staging" for the gate to evaluate. With a real shared
      # registry configured, dev->staging already put one there.
      - name: Ensure a Staging candidate exists
        if: env.HAS_SHARED_REGISTRY == 'false'
        working-directory: ml/src
        run: python train.py --model-type logreg --register

      - name: Model promotion quality gate (Staging -> Production)
        working-directory: ml/src
        run: python promote.py

      - name: Deploy backend + frontend to production
        if: env.BACKEND_DEPLOY_HOOK != ''
        run: |
          echo "Gate passed -> deploying the promoted model to production"
          curl -fsSL -X POST "$BACKEND_DEPLOY_HOOK"
          curl -fsSL -X POST "$FRONTEND_DEPLOY_HOOK"
